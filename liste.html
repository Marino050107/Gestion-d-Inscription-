<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Inscrits | EMIT</title>
    <link rel="stylesheet" href="liste.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body onload="chargerListe()">

    <header class="list-header">
        <div class="header-content">
            <h1>Registre des Inscriptions</h1>
            <p>EMIT - Université de Fianarantsoa</p>
        </div>
        <nav class="list-nav">
            <a href="accueil.html">Accueil</a>
            <a href="representation.html">Vie à l'EMIT</a>
            <a href="inscription.html" class="btn-new">+ Nouvelle Inscription</a>
        </nav>
    </header>

    <main class="container">
        <div class="search-wrapper">
            <input type="text" id="searchBar" onkeyup="filtrerListe()" placeholder="🔍 Rechercher un étudiant par son nom...">
        </div>

        <div class="table-card fade-in">
            <div class="table-info">
                <h3>Liste des Étudiants Enregistrés</h3>
                <span id="counter" class="badge">0 étudiant(s)</span>
            </div>
            
            <div class="scroll-container">
                <table id="tableInscrits">
                    <thead>
                        <tr>
                            <th>Nom & Prénoms</th>
                            <th>Adresse</th> <th>Email</th>
                            <th>Parcours</th>
                            <th>Date d'inscription</th>
                            <th>Action</th> </tr>
                    </thead>
                    <tbody id="corpsTableau">
                        </tbody>
                </table>
            </div>
            
            <div id="noData" class="empty-state">
                <p>Aucune inscription n'a été trouvée dans la base de données locale.</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
