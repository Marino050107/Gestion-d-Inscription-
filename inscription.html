<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvelle Inscription | EMIT</title>
    <link rel="stylesheet" href="inscription.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="form-wrapper">
        <div class="form-card fade-in">
            <div class="form-header">
                <h2>Fiche d'Inscription</h2>
                <p>Formulaire d'intégration des nouveaux étudiants</p>
                <div class="underline"></div>
            </div>

            <form id="inscriptionForm">
                <div class="form-group">
                    <label for="nom">Nom de l'étudiant</label>
                    <input type="text" id="nom" placeholder="ex: RAKOTO" required>
                </div>

                <div class="form-group">
                    <label for="prenom">Prénom(s)</label>
                    <input type="text" id="prenom" placeholder="ex: Marino" required>
                </div>

                <div class="form-group">
                    <label for="date_naiss">Date de naissance</label>
                    <input type="date" id="date_naiss" required>
                </div>

                <div class="form-group">
                    <label for="adresse">Adresse de résidence</label>
                    <input type="text" id="adresse" placeholder="ex: Lot 123 Bis Andrainjato" required>
                </div>

                <div class="form-group">
                    <label for="email">Adresse Email</label>
                    <input type="email" id="email" placeholder="ex: marino@emit.mg" required>
                </div>

                <div class="form-group">
                    <label for="parcours">Parcours académique</label>
                    <select id="parcours" required>
                        <option value="">-- Sélectionner un parcours --</option>
                        <option value="DAI">Développement d'Applications Intelligentes (DAI)</option>
                        <option value="AES">Administration et Échanges Sécurisés (AES)</option>
                        <option value="MSI">Management des Systèmes d'Information (MSI)</option>
                    </select>
                </div>

                <div class="actions-grid">
                    <button type="submit" class="btn-save">Enregistrer</button>
                    <a href="liste.html" class="btn-view-list">Voir la liste</a>
                </div>
                
                <a href="accueil.html" class="btn-back">← Retour à l'accueil</a>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
